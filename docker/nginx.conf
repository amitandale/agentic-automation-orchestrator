# Nginx reverse proxy configuration for the orchestrator dashboard.
# Terminates SSL and proxies to Paperclip's dashboard on port 3101.
#
# Setup:
#   1. Copy this to /etc/nginx/sites-available/orchestrator
#   2. ln -s /etc/nginx/sites-available/orchestrator /etc/nginx/sites-enabled/
#   3. Run: sudo certbot --nginx -d your-domain.com
#   4. sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;

    # Certbot will add HTTPS redirect here
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    # SSL certificates (managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Paperclip Dashboard
    location / {
        proxy_pass http://127.0.0.1:3101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for live dashboard updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Paperclip API (restricted access)
    location /api/ {
        proxy_pass http://127.0.0.1:3100/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Only allow from localhost and your IP
        # allow 127.0.0.1;
        # allow YOUR_IP_HERE;
        # deny all;
    }

    # Block direct access to other service ports
    location ~ ^/(qdrant|hermes|openclaw) {
        return 403;
    }
}
