version: "3.9"

# Development override — enables dry-run mode and debug ports
# Usage: docker compose -f docker-compose.yml -f docker/docker-compose.dev.yml up -d

services:
  openclaw:
    environment:
      - DRY_RUN=true
      - LOG_LEVEL=debug

  hermes:
    environment:
      - LOG_LEVEL=debug

  paperclip:
    environment:
      - LOG_LEVEL=debug
